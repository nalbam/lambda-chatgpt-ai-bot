# yaml-language-server: $schema=https://raw.githubusercontent.com/lalcebo/json-schema/master/serverless/reference.json
service: lambda-chatgpt-ai-bot
provider:
  name: aws
  region: us-east-1
  runtime: python3.11
  stage: ${opt:stage, 'dev'}
  architecture: arm64
  memorySize: 5120
  timeout: 60
  environment:
    BASE_NAME: chatgpt-ai-bot
  iam:
    role:
      name: chatgpt-ai-bot
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:Query
          Resource:
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.BASE_NAME}-*"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.BASE_NAME}-*/index/*"

functions:
  mention:
    handler: handler.lambda_handler
    events:
      - http:
          method: post
          path: /slack/events
    tags:
      Project: ${self:provider.environment.BASE_NAME}

resources:
  Resources:
    DynamoDBTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.BASE_NAME}-${self:provider.stage}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        ProvisionedThroughput:
          ReadCapacityUnits: 5
          WriteCapacityUnits: 5
        TimeToLiveSpecification:
          AttributeName: expire_at
          Enabled: true
        Tags:
          - Key: Project
            Value: ${self:provider.environment.BASE_NAME}

custom:
  pythonRequirements:
    dockerizePip: true
    dockerImage: public.ecr.aws/sam/build-python3.11:latest-arm64

plugins:
  - serverless-python-requirements
  - serverless-dotenv-plugin
